<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理员登录</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f6fb;
        margin: 0;
        padding: 24px;
        color: #1f2328;
      }

      .container {
        max-width: 420px;
        margin: 80px auto;
      }

      .card {
        background: #ffffff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 26px;
      }

      input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        border: 1px solid #d0d7de;
        border-radius: 10px;
        font-size: 15px;
        margin-bottom: 16px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #0969da;
        color: white;
        font-size: 15px;
        cursor: pointer;
      }

      .error {
        color: #cf222e;
        margin-bottom: 12px;
      }

      a {
        display: inline-block;
        margin-top: 16px;
        color: #0969da;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>管理员登录</h1>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin-login">
          <input type="password" name="password" placeholder="请输入管理员密码" required />
          <button type="submit">登录</button>
        </form>

        <a href="/">返回用户页面</a>
      </div>
    </div>
  </body>
</html>
